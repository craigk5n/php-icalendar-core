name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        # infection/infection (mutation testing) requires PHP >=8.2 and runs only
        # in the dedicated mutation job on 8.3. The library itself, and PHPUnit,
        # support 8.1, so on 8.1 install ignoring the php platform check and simply
        # do not run infection here. The test suite below then executes on genuine
        # 8.1, so any 8.2-only code would still fail.
        run: |
          if [ "${{ matrix.php }}" = "8.1" ]; then
            composer install --no-interaction --prefer-dist --ignore-platform-req=php
          else
            composer install --no-interaction --prefer-dist
          fi

      - name: Run tests
        run: vendor/bin/phpunit --exclude-group performance --no-coverage

  tests-non-utc:
    name: Tests (non-UTC host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none
          # America/New_York exercises a DST spring-forward gap and a negative
          # UTC offset; both surfaced host-timezone coupling that the UTC-only
          # matrix above could never catch (see issue #17). The library hands out
          # DateTimeImmutables and parses floating, UTC and zoned DATE-TIME forms,
          # so at least one non-UTC clock must run the full suite.
          ini-values: date.timezone=America/New_York

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit --exclude-group performance --no-coverage

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests with coverage
        run: vendor/bin/phpunit --exclude-group performance --coverage-clover build/logs/clover.xml

      - name: Check coverage threshold
        run: |
          php -r '
          $xml = simplexml_load_file("build/logs/clover.xml");
          $metrics = $xml->xpath("//metrics");
          $statements = 0;
          $covered = 0;
          foreach ($metrics as $m) {
              $statements += (int) $m["statements"];
              $covered += (int) $m["coveredstatements"];
          }
          $pct = $statements > 0 ? round($covered / $statements * 100, 2) : 0;
          echo "Coverage: {$pct}%\n";
          if ($pct < 80) {
              echo "::error::Coverage {$pct}% is below the 80% threshold\n";
              exit(1);
          }
          '

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer phpstan

  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Psalm
        run: vendor/bin/psalm --report=results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Infection
        # No --only-covered: it excluded wholly-uncovered code from the score
        # rather than penalising it, so five dead classes (#19) and 401 untested
        # mutants cost nothing. Thresholds live in infection.json.dist so a local
        # run enforces exactly what CI does.
        #   minMsi 68        -- total score; measured 70.6%, so ~2.6pts of room.
        #                       Ratchet upward as the untested files gain tests.
        #   minCoveredMsi 78 -- locks in today's covered-code score so already
        #                       tested code cannot quietly degrade.
        run: vendor/bin/infection --threads=4 --no-progress
        env:
          INFECTION_BADGE_API_KEY: ${{ secrets.INFECTION_BADGE_API_KEY }}
